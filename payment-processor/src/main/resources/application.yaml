spring:
  application:
    name: payment-processor

  datasource:
    url: jdbc:mysql://localhost:3306/cartdb
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
